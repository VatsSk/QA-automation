spring:
  application:
    name: Testing Automation

  data:
    mongodb:
      uri: mongodb://localhost:27017/testforge
      # Atlas: mongodb+srv://<user>:<pass>@cluster.mongodb.net/testforge?retryWrites=true&w=majority

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

aws:
  s3:
    bucket: interns-tf-project/qa_automation


server:
  port: 8080


logging:
  level:
    root: INFO
    com.testingautomation.autotest: DEBUG


autotest:
  browser: chrome
  headless: false

  results:
    base-dir: ./test-results

  screenshot-dir: screenshots

  screenshot-on-step: true

  scanner:
    timeout-seconds: 15
    user-agent: "AutoTestScannerClient/1.0"