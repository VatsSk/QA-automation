spring:
  application:
    name: Testing Automation

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/qadb}
      database: ${MONGO_DB:qadb}
      # Atlas: mongodb+srv://<user>:<pass>@cluster.mongodb.net/testforge?retryWrites=true&w=majority

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB


server:
  port: 8080

  runner:
    base-url: ${RUNNER_BASE_URL:http://localhost:8080}
    run-auth-path: /runner/run-auth
    timeout-seconds: ${RUNNER_TIMEOUT:120}

  # MinIO / S3 configuration
storage:
  s3:
    region: ${AWS_REGION}
    bucket-name: ${S3_BUCKET}
    base-prefix: ${S3_BASE_PREFIX}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    presigned-url-expiry-minutes: ${S3_PRESIGNED_EXPIRY_MINUTES}
logging:
  level:
    root: INFO
    com.testingautomation.autotest: DEBUG
    org.springframework.data.mongodb: INFO


autotest:
  browser: chrome
  headless: false

  results:
    base-dir: ./test-results

  screenshot-dir: screenshots

  screenshot-on-step: true

  scanner:
    timeout-seconds: 15
    user-agent: "AutoTestScannerClient/1.0"


    pagination:
      default-page-size: 20
      max-page-size: 100

