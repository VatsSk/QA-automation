<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects — QA Manager</title>
    <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><span class="logo">🧪</span> QA Manager</div>
        <nav class="sidebar-nav">
            <a href="index.html">    <span class="icon">📊</span> Dashboard</a>
            <a href="projects.html"> <span class="icon">📁</span> Projects</a>
            <a href="modules.html">  <span class="icon">🗂️</span> Modules</a>
            <a href="runs.html">     <span class="icon">▶️</span> Runs</a>
        </nav>
        <div class="sidebar-footer">
            <div style="flex:1"><div class="u-name" id="sb-username">—</div><div class="u-role" id="sb-role">—</div></div>
            <button class="btn btn-ghost btn-sm" id="logout-btn">⏏️</button>
        </div>
    </aside>

    <div class="main">
        <header class="topnav">
            <div class="topnav-left"><span class="topnav-title">Projects</span></div>
            <div class="topnav-right">
                <input type="search" id="search-input" class="form-control" style="width:220px;" placeholder="Search projects…" />
                <button class="btn btn-primary" id="new-project-btn">+ New Project</button>
                <button class="theme-btn" id="theme-btn">🌙</button>
            </div>
        </header>

        <main class="page">
            <div class="section-header">
                <span class="section-title">All Projects</span>
                <span class="section-meta" id="project-count"></span>
            </div>
            <div id="projects-grid" class="projects-grid">
                <div class="spinner-wrap"><div class="spinner"></div></div>
            </div>
        </main>
    </div>
</div>

<!-- Project modal -->
<div id="project-modal" class="overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">New Project</span>
            <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
        </div>
        <form id="project-form" novalidate>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="field-name">Name <span class="req">*</span></label>
                    <input id="field-name" type="text" class="form-control" placeholder="My Project" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="field-description">Description</label>
                    <textarea id="field-description" class="form-control" placeholder="What does this project test?"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="field-baseUrl">Base URL</label>
                    <input id="field-baseUrl" type="text" class="form-control" placeholder="https://app.example.com" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="field-tags">Tags <span class="form-hint">(comma-separated)</span></label>
                    <input id="field-tags" type="text" class="form-control" placeholder="smoke, regression, nightly" />
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                <button type="submit"  class="btn btn-primary"   id="modal-save-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="js/project.js"></script>
</body>
</html>
